<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dragon RPG - ระบบแยกไฟล์</title>
    <link rel="stylesheet" href="style.css"> <!-- ดึงดีไซน์จากไฟล์สไตล์ -->
</head>
<body>

    <!-- 1. หน้าโหลด (Loading Screen) -->
    <div id="loading-screen" class="screen active">
        <div id="loader">🏮 กำลังรวบรวมลมปราณ...</div>
    </div>

    <!-- 2. หน้าล็อคอิน (Login Screen) -->
    <div id="login-screen" class="screen">
        <h1 style="color:var(--red)">เข้าสู่ยุทธภพ</h1>
        <div class="login-box">
            <input type="text" id="uid" placeholder="UID (ชื่อจอมยุทธ์)">
            <input type="password" id="pid" placeholder="PID (รหัสลับ)">
            <button style="background:var(--red); width:100%" onclick="login()">เริ่มต้นการเดินทาง</button>
        </div>
    </div>

    <!-- 3. หน้าเกมหลัก (Game Screen) -->
    <div id="game-screen" class="screen">
        <div class="status-box">
            <h2 id="p-name" style="color:var(--gold); margin:0;">จอมยุทธ์</h2>
            <div id="p-rank">รวบรวมปราณ ขั้น 1</div>
            <div class="bar-bg"><div id="hp-bar"></div></div>
        </div>
        <div class="grid">
            <button style="background:var(--gold); color:black;" onclick="action()">🧘 บ่มเพาะ</button>
            <button style="background:var(--blue);" onclick="alert('ระบบกำลังพัฒนา...')">🚶 เดินสำรวจ</button>
        </div>
        <div id="log">> เข้าสู่เกมสำเร็จ</div>
    </div>

    <script>
        // ระบบจำลองการโหลด
        setTimeout(() => {
            document.getElementById('loading-screen').classList.remove('active');
            document.getElementById('login-screen').classList.add('active');
        }, 2000); // โหลด 2 วินาที

        function login() {
            let u = document.getElementById('uid').value;
            if(u) {
                document.getElementById('p-name').innerText = "ท่าน " + u;
                document.getElementById('login-screen').classList.remove('active');
                document.getElementById('game-screen').classList.add('active');
            } else { alert("กรุณาใส่ชื่อ!"); }
        }

        function action() {
            let log = document.getElementById('log');
            log.innerHTML = "> บ่มเพาะพลังสำเร็จ!<br>" + log.innerHTML;
        }
    </script>
</body>
</html>
