<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dragon RPG - Admin Edition</title>
    <style>
        /* รวม CSS ไว้ที่นี่เพื่อป้องกันปัญหาไฟล์ไม่โหลด */
        :root { --gold: #f1c40f; --red: #e74c3c; --dark: #0a0a0a; --blue: #3498db; --purple: #9b59b6; }
        body { margin: 0; background-color: var(--dark); color: #fff; font-family: 'Sarabun', sans-serif; display: flex; justify-content: center; min-height: 100vh; }
        .screen { display: none; width: 100%; max-width: 450px; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; background: #1a1a1a; border: 2px solid #333; border-radius: 20px; margin-top: 20px; }
        .active { display: flex; }
        .status-box { width: 100%; background: #222; padding: 15px; border-radius: 12px; border: 1px solid var(--gold); margin-bottom: 15px; box-sizing: border-box; }
        .bar-bg { width: 100%; height: 12px; background: #000; border-radius: 6px; overflow: hidden; margin: 5px 0; border: 1px solid #444; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        button { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; background: #444; transition: 0.2s; }
        button:hover { transform: scale(1.02); filter: brightness(1.2); }
        #log { width: 100%; height: 100px; background: #000; padding: 10px; font-size: 0.8rem; color: #2ecc71; overflow-y: auto; border: 1px solid #333; border-radius: 8px; margin-top: 10px; }
        .scenario-box { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 400px; background: #1a1a1a; border: 3px double var(--gold); padding: 20px; z-index: 2000; border-radius: 20px; text-align: center; box-shadow: 0 0 50px #000; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1999; }
    </style>
</head>
<body>

    <!-- หน้าจอล็อคอิน -->
    <div id="login-screen" class="screen active">
        <h1 style="color:var(--red)">🐲 THE DRAGON RPG</h1>
        <div style="width:100%; text-align:center;">
            <input type="text" id="uid" placeholder="ชื่อจอมยุทธ์" style="width:80%; padding:10px; margin-bottom:10px; background:#000; color:#fff; border:1px solid var(--gold);">
            <input type="password" id="pid" placeholder="รหัสผ่าน" style="width:80%; padding:10px; margin-bottom:10px; background:#000; color:#fff; border:1px solid var(--gold);">
            <button onclick="handleAuth()" style="width:85%; background:var(--red)">เข้าสู่ยุทธภพ</button>
        </div>
    </div>

    <!-- หน้าจอเกมหลัก -->
    <div id="game-screen" class="screen">
        <div class="status-box">
            <div style="display:flex; justify-content:space-between">
                <h2 id="p-name" style="color:var(--gold); margin:0;">จอมยุทธ์</h2>
                <span id="p-admin-tag" style="color:var(--red); font-weight:bold; display:none;">[ADMIN]</span>
            </div>
            <div style="color:#2ecc71; font-weight:bold;">💰 ทอง: <span id="p-coin">0</span> Gold</div>
            <div id="p-rank-text" style="margin-top:5px;">ระดับ: ขั้น 1</div>
            <div class="bar-bg"><div id="exp-bar" style="width:0%; height:100%; background:var(--blue);"></div></div>
        </div>

        <div class="grid">
            <button style="background:var(--gold); color:black;" onclick="train()">🧘 บ่มเพาะ</button>
            <button style="background:var(--blue);" onclick="triggerScenario()">🎲 ผจญภัย</button>
            <button style="background:var(--purple); grid-column: span 2;" onclick="toggleAdmin()">🛠️ แผงควบคุมแอดมิน</button>
        </div>

        <div id="admin-panel" style="display:none; width:100%; margin-top:10px; background:#333; padding:10px; border-radius:8px; box-sizing:border-box;">
            <button onclick="addCoin(1000000)" style="font-size:0.7rem;">+1M Gold</button>
            <button onclick="p.rank++; updateUI(); saveData();" style="font-size:0.7rem;">+1 Level</button>
        </div>

        <div id="log">> ยินดีต้อนรับท่านจอมยุทธ์</div>
    </div>

    <!-- ระบบสถานการณ์จำลอง -->
    <div id="overlay" class="overlay"></div>
    <div id="scenario-modal" class="scenario-box">
        <div id="scenario-img" style="font-size:3rem;">🐲</div>
        <h2 id="scenario-title" style="color:var(--gold)">เกิดเหตุการณ์!</h2>
        <p id="scenario-desc" style="color:#ccc">...</p>
        <div id="scenario-choices"></div>
    </div>

    <script src="script.js"></script>
    <script>
        // ฟังก์ชันบ่มเพาะแบบด่วน
        function train() {
            p.exp += 25; p.coin += 1000;
            if(p.exp >= 100) { p.rank++; p.exp = 0; addLog("⚡ เลื่อนระดับ!"); }
            updateUI(); saveData(); addLog("🧘 บ่มเพาะพลัง...");
        }

        // ระบบ Admin
        function toggleAdmin() {
            let panel = document.getElementById('admin-panel');
            panel.style.display = (panel.style.display === 'none') ? 'block' : 'none';
        }

        function addCoin(amt) { p.coin += amt; updateUI(); saveData(); addLog("🛠️ เสกทอง!"); }
    </script>
</body>
</html>
