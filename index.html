<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dragon RPG - ระบบแยกไฟล์สมบูรณ์</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loading-screen" class="screen active">
        <h2 style="color:var(--gold)">🐉 THE DRAGON RPG</h2>
        <div id="loader">กำลังเชื่อมต่อฐานข้อมูลสำนัก... <span id="load-pc">0%</span></div>
    </div>

    <div id="login-screen" class="screen">
        <h1 style="color:var(--red)">เข้าสู่ยุทธภพ</h1>
        <div class="login-box">
            <input type="text" id="uid" placeholder="UID (ชื่อผู้ใช้งาน)">
            <input type="password" id="pid" placeholder="PID (รหัสผ่าน)">
            <button onclick="handleAuth()" style="background:var(--red); width:100%">ยืนยันตัวตน</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="status-box">
            <h2 id="p-name" style="color:var(--gold); margin:0;">จอมยุทธ์</h2>
            <span id="p-admin-tag" style="color:#e74c3c; font-weight:bold; display:none;">[ADMIN]</span>
            <div style="color:#2ecc71">💰 ทอง: <span id="p-coin">0</span> Gold</div>
            <div id="p-rank-text">ระดับ: ขั้น 1</div>
            <div class="bar-bg"><div id="exp-bar" style="width:0%; height:100%; background:var(--blue);"></div></div>
        </div>
        <div class="grid">
            <button style="background:var(--gold); color:black;" onclick="train()">🧘 บ่มเพาะ</button>
            <button style="background:var(--blue);" onclick="openShop()">🛒 ร้านค้า</button>
            <button style="background:var(--purple);" onclick="toggleAdmin()">🛠️ แอดมิน</button>
        </div>
        <div id="log">> ระบบพร้อม...</div>
    </div>

    <!-- หน้าต่างร้านค้า -->
    <div id="overlay" class="overlay" onclick="closeShop()" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:99;"></div>
    <div id="shop-modal" class="modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width:80%; background:#111; border:2px solid var(--gold); padding:20px; z-index:100; border-radius:15px;">
        <h3 style="color:var(--gold)">🛒 ร้านค้าเซียน</h3>
        <button onclick="buyItem('medicine', 100)" style="width:100%; margin-bottom:5px;">ซื้อยาทิพย์ (100 G)</button>
        <button onclick="closeShop()" style="width:100%; background:#555;">ปิด</button>
    </div>

    <!-- แผงแอดมิน -->
    <div id="admin-panel" style="display:none; background:#222; border:1px solid red; padding:10px; margin-top:10px; width:100%;">
        <button onclick="addCoin(5000)">+5000 ทอง</button>
    </div>

    <!-- เรียกใช้ไฟล์ระบบหลัก -->
    <script src="script.js"></script> 
    <script>
        // โหลดหน้าจอ
        let lp = 0;
        let iv = setInterval(() => {
            lp += 20;
            document.getElementById('load-pc').innerText = lp + "%";
            if(lp >= 100) { 
                clearInterval(iv);
                document.getElementById('loading-screen').classList.remove('active');
                document.getElementById('login-screen').classList.add('active');
            }
        }, 200);

        function train() {
            p.exp += 25;
            p.coin += 50;
            if(p.exp >= 100) { p.rank++; p.exp = 0; }
            updateUI();
            saveData();
            addLog("🧘 บ่มเพาะสำเร็จ!");
        }
    </script>
</body>
</html>
